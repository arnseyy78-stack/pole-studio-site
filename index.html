<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Class</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0c0911;
color:white;
}

.container{
width:90%;
max-width:600px;
margin:auto;
padding:40px 0;
}

h1{text-align:center}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:#1a1324;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#d88dff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.card{
background:#1a1324;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Book Your Class</h1>

<div class="card">

<input id="name" placeholder="Your Name">

<input id="phone" placeholder="Phone Number">

<select id="classType">
<option>Pole Dance</option>
<option>Aerial Hoop</option>
</select>

<select id="day">
<option>Monday 9AM</option>
<option>Thursday 4PM</option>
<option>Saturday 9AM</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="sendBooking()">🔥 Reserve My Spot Now</button>

</div>

</div>

<script>

function sendBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let classType=document.getElementById("classType").value;
let day=document.getElementById("day").value;
let notes=document.getElementById("notes").value;

let message = 
`Hi! I'd like to book a class 💜

Name: ${name}
Phone: ${phone}
Class: ${classType}
Schedule: ${day}
Notes: ${notes}

Please confirm my slot.`;

window.open("https://wa.me/639063782296?text=" + encodeURIComponent(message));

}

</script>

</body>
</html>
